openapi: 3.1.0
info:
  title: DevTrack API
  description: REST API for DevTrack - an open-source developer productivity dashboard
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://devtrack.vercel.app
    description: Production server

security:
  - cookieAuth: []

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: next-auth.session-token

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string

    Goal:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        target:
          type: number
        current:
          type: number
        createdAt:
          type: string
          format: date-time

    Streak:
      type: object
      properties:
        current:
          type: number
        longest:
          type: number
        lastActive:
          type: string
          format: date-time

paths:
  # AUTH ROUTES
  /api/auth/link-github:
    get:
      tags: [Auth]
      summary: Initiate GitHub account linking
      security:
        - cookieAuth: []
      responses:
        '302':
          description: Redirects to GitHub OAuth
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/link-github/callback:
    get:
      tags: [Auth]
      summary: GitHub OAuth callback for account linking
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirects after successful linking
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # BADGE ROUTES
  /api/badge/streak:
    get:
      tags: [Badges]
      summary: Get streak badge SVG
      parameters:
        - name: user
          in: query
          required: true
          schema:
            type: string
          description: GitHub username
      responses:
        '200':
          description: SVG badge
          content:
            image/svg+xml:
              schema:
                type: string
        '404':
          description: User not found

  /api/badge/commits:
    get:
      tags: [Badges]
      summary: Get commits badge SVG
      parameters:
        - name: user
          in: query
          required: true
          schema:
            type: string
          description: GitHub username
      responses:
        '200':
          description: SVG badge
          content:
            image/svg+xml:
              schema:
                type: string
        '404':
          description: User not found

  # GOALS ROUTES
  /api/goals:
    get:
      tags: [Goals]
      summary: Get all goals for authenticated user
      security:
        - cookieAuth: []
      responses:
        '200':
          description: List of goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Goal'
        '401':
          description: Unauthorized
    post:
      tags: [Goals]
      summary: Create a new goal
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, target]
              properties:
                title:
                  type: string
                target:
                  type: number
      responses:
        '201':
          description: Goal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Goal'
        '401':
          description: Unauthorized

  /api/goals/{id}:
    put:
      tags: [Goals]
      summary: Update a goal
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                target:
                  type: number
                current:
                  type: number
      responses:
        '200':
          description: Goal updated
        '401':
          description: Unauthorized
        '404':
          description: Goal not found
    delete:
      tags: [Goals]
      summary: Delete a goal
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Goal deleted
        '401':
          description: Unauthorized
        '404':
          description: Goal not found

  # METRICS ROUTES
  /api/metrics/contributions:
    get:
      tags: [Metrics]
      summary: Get contribution graph data
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Contribution data
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized

  /api/metrics/repos:
    get:
      tags: [Metrics]
      summary: Get list of user repositories
      security:
        - cookieAuth: []
      responses:
        '200':
          description: List of repositories
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '401':
          description: Unauthorized

  /api/metrics/languages:
    get:
      tags: [Metrics]
      summary: Get language breakdown across repos
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Language stats
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized

  /api/metrics/prs:
    get:
      tags: [Metrics]
      summary: Get pull request stats
      security:
        - cookieAuth: []
      responses:
        '200':
          description: PR statistics
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized

  /api/metrics/pr-breakdown:
    get:
      tags: [Metrics]
      summary: Get detailed PR breakdown
      security:
        - cookieAuth: []
      responses:
        '200':
          description: PR breakdown data
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized

  /api/metrics/issues:
    get:
      tags: [Metrics]
      summary: Get issues stats
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Issues statistics
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized

  /api/metrics/streak:
    get:
      tags: [Metrics]
      summary: Get streak metrics
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Streak data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Streak'
        '401':
          description: Unauthorized

  /api/metrics/pinned-repos:
    get:
      tags: [Metrics]
      summary: Get pinned repositories
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Pinned repos
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '401':
          description: Unauthorized

  /api/metrics/repo-health:
    get:
      tags: [Metrics]
      summary: Get repository health score
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Repo health data
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized

  /api/metrics/weekly-summary:
    get:
      tags: [Metrics]
      summary: Get weekly activity summary
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Weekly summary
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized

  /api/metrics/compare:
    get:
      tags: [Metrics]
      summary: Compare metrics between two users
      security:
        - cookieAuth: []
      parameters:
        - name: user
          in: query
          required: true
          schema:
            type: string
          description: Username to compare with
      responses:
        '200':
          description: Comparison data
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized

  # PUBLIC ROUTES
  /api/public/{username}:
    get:
      tags: [Public]
      summary: Get public profile data for a user
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Public profile data
          content:
            application/json:
              schema:
                type: object
        '404':
          description: User not found

  # STREAK ROUTES
  /api/streak/freeze:
    post:
      tags: [Streak]
      summary: Use a streak freeze to protect current streak
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Streak freeze applied
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '400':
          description: No streak freezes available

  # USER ROUTES
  /api/user/settings:
    get:
      tags: [User]
      summary: Get user settings
      security:
        - cookieAuth: []
      responses:
        '200':
          description: User settings
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
    put:
      tags: [User]
      summary: Update user settings
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Settings updated
        '401':
          description: Unauthorized

  /api/user/github-accounts:
    get:
      tags: [User]
      summary: Get linked GitHub accounts
      security:
        - cookieAuth: []
      responses:
        '200':
          description: List of linked accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '401':
          description: Unauthorized

  /api/user/github-accounts/{githubId}:
    delete:
      tags: [User]
      summary: Unlink a GitHub account
      security:
        - cookieAuth: []
      parameters:
        - name: githubId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account unlinked
        '401':
          description: Unauthorized
        '404':
          description: Account not found